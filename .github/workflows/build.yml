name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dotnet:
    name: Build .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - run: dotnet restore
      - run: dotnet build --no-restore

  console:
    name: Build Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/Pilot.Console/package-lock.json
      - run: npm ci
        working-directory: src/Pilot.Console
      - run: npm run build
        working-directory: src/Pilot.Console
